# Local server (site)
server.port=8080

service.urlSite=http://checkdev.ru/

# Logging
logging.level.root=INFO
logging.level.ru.checkdev=DEBUG
logging.file.name=logs/site.log

# Telegram
botUserName=checkdev_bot
# Other
spring.main.banner-mode=off
server.servlet.context-path=
server.servlet.session.tracking-modes=COOKIE
server.servlet.session.timeout=-1
### The size in Kb of the uploaded file in the user editing form (Person Controller)
server.site.maxSizeLoadFile=1000000
### The size of the image in pixel to which it will be compressed before loading.
server.site.imageSizePixel=500
### Allowed file type\photo to upload to profile.
server.site.contentTypeFile=image/jpeg,image/JPG,image/png
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB

# Kafka
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.max.block.ms=1000
spring.kafka.producer.properties.spring.json.type.mapping=categoryWithTopic:ru.job4j.site.dto.CategoryWithTopicDTO,innerMessage:ru.job4j.site.dto.InnerMessageDTO,feedbackNotification:ru.job4j.site.dto.FeedbackNotificationDTO,interviewNotify:ru.job4j.site.dto.InterviewNotifyDTO,wisherNotify:ru.job4j.site.dto.WisherNotifyDTO,cancelInterview:ru.job4j.site.dto.CancelInterviewNotificationDTO,wisherDismissed:ru.job4j.site.dto.WisherDismissedDTO,wisherApproved:ru.job4j.site.dto.WisherApprovedDTO

# Eureka
spring.application.name = site
eureka.client.fetch-registry = true
eureka.client.register-with-eureka = true
eureka.client.service-url.defaultZone = http://localhost:9009/eureka
